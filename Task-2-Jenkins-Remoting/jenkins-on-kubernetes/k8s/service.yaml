apiVersion: v1
kind: Service

metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins

spec:
  type: NodePort

  selector:
    app: jenkins

  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080

    - name: agent
      protocol: TCP
      port: 50000
      targetPort: 50000
      nodePort: 32000
