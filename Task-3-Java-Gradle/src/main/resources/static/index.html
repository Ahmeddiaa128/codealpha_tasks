<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CodeAlpha DevOps Showcase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            🚀 CodeAlpha DevOps Showcase
        </h1>

        <p class="text-secondary">
            Spring Boot • Docker • GitHub Actions • Swagger
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>
                        <i class="fa-solid fa-circle-info"></i>
                        Application Information
                    </h4>

                    <hr>

                    <div id="application-info">

                        Loading...

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>

                        <i class="fa-solid fa-server"></i>

                        System Information

                    </h4>

                    <hr>

                    <div id="system-info">

                        Loading...

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-12">

            <div class="card shadow">

                <div class="card-body text-center">

                    <button id="buildBtn"
                            class="btn btn-success me-2">

                        Build Info

                    </button>

                    <button id="healthBtn"
                            class="btn btn-dark me-2">

                        Health Check

                    </button>

                    <a href="/swagger-ui/index.html"
                       target="_blank"
                       class="btn btn-primary">

                        Swagger UI

                    </a>

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>

                        <i class="fa-solid fa-box"></i>

                        Build Information

                    </h4>

                    <hr>

                    <div id="build-info">

                        Click "Build Info"

                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>

                        <i class="fa-solid fa-heart-pulse"></i>

                        Health Status

                    </h4>

                    <hr>

                    <div id="health-info">

                        Click "Health Check"

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
